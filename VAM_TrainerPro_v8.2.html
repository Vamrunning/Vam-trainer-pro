<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAM Trainer Pro v9.0 | Acceso Verificado</title>
    <style>
        :root {
            --bg: #0d0e12;
            --surface: #16181e;
            --accent: #00e676;
            --text: #ffffff;
            --red: #ff4444;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        
        /* Pantalla de Acceso */
        #acceso-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .login-card {
            background: var(--surface); padding: 2rem; border-radius: 1rem;
            width: 90%; max-width: 400px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        input {
            width: 100%; padding: 12px; margin: 15px 0;
            background: #000; border: 1px solid #333;
            color: white; border-radius: 8px; text-align: center; font-size: 1.1rem;
        }
        button {
            width: 100%; padding: 12px; background: var(--accent);
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        #acceso-error { color: var(--red); display: none; font-size: 0.9rem; margin-top: 10px; }
        
        /* Animación Shake */
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* Contenido Principal (Oculto al inicio) */
        #main-content { padding: 20px; display: none; }
    </style>
</head>
<body>

    <div id="acceso-screen">
        <div class="login-card">
            <h2 style="color: var(--accent)">VAM TRAINER PRO</h2>
            <p style="opacity: 0.7; font-size: 0.9rem">Introduce tu clave de acceso</p>
            <input type="password" id="pass-input" placeholder="••••••••">
            <button onclick="verificarAcceso()">ENTRAR AHORA</button>
            <p id="acceso-error">⚠️ Clave incorrecta. Inténtalo de nuevo.</p>
        </div>
    </div>

    <div id="main-content">
        <h1>Bienvenido a VAM Trainer Pro</h1>
        <p>El sistema está funcionando correctamente.</p>
        </div>

    <script>
        // 1. Verificación automática al cargar (Si ya entró antes)
        window.onload = function() {
            if (localStorage.getItem('vam_acceso') === 'true') {
                document.getElementById('acceso-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }
        };

        // 2. Función de validación corregida
        function verificarAcceso() {
            const input = document.getElementById('pass-input');
            const error = document.getElementById('acceso-error');
            const clave = input.value.trim().toUpperCase();

            // CLAVES: VAM2024 o DEMO
            if (clave === "VAM2024" || clave === "DEMO") {
                localStorage.setItem('vam_acceso', 'true'); // Guardar sesión
                
                const screen = document.getElementById('acceso-screen');
                screen.style.opacity = '0';
                
                setTimeout(() => {
                    screen.style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    document.body.style.overflow = 'auto';
                }, 500);
            } else {
                error.style.display = 'block';
                input.classList.add('shake');
                input.style.borderColor = "var(--red)";
                setTimeout(() => input.classList.remove('shake'), 400);
            }
        }

        // Permitir entrar con la tecla Enter
        document.getElementById('pass-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                verificarAcceso();
            }
        });
    </script>
</body>
</html>
